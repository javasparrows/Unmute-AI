services:
  db:
    image: postgres:16-alpine
    container_name: unmute-ai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: translation_editor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: unmute-ai-image
    container_name: unmute-ai-container
    env_file: .env.local
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/translation_editor"
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
